<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tamil Nadu Forest Cover Analysis</title>

    <!-- Font & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        :root {
            /* Creative Lab Theme Colors (Landing) */
            --bg-hero: radial-gradient(circle at center, #0a192f 0%, #020617 100%);
            --accent-forest: #00D084; /* Vibrant Emerald */
            --accent-land: #F72585;   /* Sunset Magenta */
            --accent-water: #4361EE;  /* Electric Indigo */
            
            /* Metallic Palette */
            --met-gold: #d4af37;
            --met-silver: #bdc3c7;
            
            --silver-metallic: linear-gradient(to right, #ffffff, #bdc3c7, #22C55E, #06b6d4, #ffffff);
            --text-light: #ffffff;
            --text-dim: #94A3B8;
            --font-main: 'Poppins', sans-serif;
        }

        body {
            font-family: var(--font-main);
            margin: 0;
            background: #020617;
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* --- IMMERSIVE HERO SECTION --- */
        #landing-page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-hero);
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s cubic-bezier(0.4, 0, 0.2, 1), filter 1s ease;
        }

        #landing-page.transitioning {
            opacity: 0;
            transform: scale(1.1);
            filter: blur(40px) brightness(1.5);
            pointer-events: none;
        }

        #hero-canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 1100px;
            padding: 20px;
            pointer-events: none;
            transition: transform 1s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.8s ease;
        }

        .transitioning .hero-content {
            transform: scale(0.8) translateZ(-100px);
            opacity: 0;
        }

        .landing-title-main {
            font-size: 3.8rem;
            font-weight: 900;
            line-height: 1.1;
            margin: 0 0 3.5rem 0;
            text-transform: uppercase;
            letter-spacing: -2px;
            background: var(--silver-metallic);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
            opacity: 0;
            animation: fadeIn 1.5s forwards 0.5s, colorFlow 10s linear infinite;
        }

        @keyframes colorFlow {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        .landing-title-main span.highlight {
            display: inline-block;
            background: linear-gradient(to right, #22C55E, #a7f3d0, #ffffff, #06b6d4, #22C55E);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(34, 197, 94, 0.8));
            animation: colorFlow 5s linear infinite reverse;
            position: relative;
        }

        .hero-btns {
            display: flex;
            gap: 20px;
            justify-content: center;
            pointer-events: auto;
            opacity: 0;
            animation: fadeInUp 1s forwards 1.2s;
        }

        .btn-main {
            padding: 22px 60px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            text-transform: uppercase;
            letter-spacing: 4px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: none;
            position: relative;
            overflow: hidden;
            background: #fff;
            color: #020617;
        }

        .btn-main:hover {
            transform: translateY(-10px);
            background: #22C55E;
            color: #fff;
            box-shadow: 0 25px 50px rgba(34, 197, 94, 0.6);
            letter-spacing: 7px;
        }

        #portal-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease-in;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- DASHBOARD UI --- */
        #dashboard-container {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            background: linear-gradient(45deg, #010409 0%, #061e1a 25%, #0f172a 50%, #1a0f2e 75%, #020617 100%);
            background-size: 400% 400%;
            animation: dashboardMeshFlow 25s ease infinite;
            min-height: 100vh;
            opacity: 0;
            transition: opacity 1.5s ease;
            position: relative;
        }

        #dashboard-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(212, 175, 55, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes dashboardMeshFlow {
            0% { background-position: 0% center; }
            50% { background-position: 100% center; }
            100% { background-position: 0% center; }
        }

        #dashboard-container.visible { display: flex; opacity: 1; }

        header {
            width: 100%;
            background: rgba(1, 4, 9, 0.85);
            backdrop-filter: blur(30px);
            border-bottom: 2px solid var(--met-gold);
            padding: 15px 50px;
            position: fixed;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 40px;
            box-sizing: border-box;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .header-item {
            color: var(--text-dim);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 10px 24px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .header-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .header-item.active-nav { 
            color: #fff; 
            background: var(--met-gold); 
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4); 
        }

        .main-content {
            width: 100%;
            margin-top: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }

        .page-section { display: none; width: 95%; max-width: 1400px; margin: 20px auto; gap: 30px; }
        .page-section.active { display: flex; flex-wrap: wrap; justify-content: center; }

        /* --- CHART PLATES --- */
        .chart-container {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.85) 0%, rgba(2, 6, 23, 0.95) 100%);
            backdrop-filter: blur(25px);
            border: 2px solid var(--met-gold);
            border-radius: 24px;
            padding: 35px;
            flex: 1;
            min-width: 450px;
            height: 480px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6), inset 0 0 15px rgba(255, 255, 255, 0.05);
            position: relative;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.27);
        }
        
        .chart-container:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: #fff;
            box-shadow: 0 35px 80px rgba(212, 175, 55, 0.15);
        }

        /* --- COMPACT METALLIC SLIDER --- */
        #time-control-dock {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 480px;
            background: rgba(13, 17, 23, 0.98);
            backdrop-filter: blur(30px);
            border-radius: 20px;
            padding: 15px 40px;
            z-index: 1500;
            border: 2px solid var(--met-gold);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .slider-label {
            letter-spacing: 5px;
            font-weight: 800;
            color: var(--text-dim);
            font-size: 0.65rem;
            text-transform: uppercase;
        }

        #year-display-large { 
            color: var(--met-gold); 
            font-size: 1.8rem;
            font-weight: 900; 
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fff, var(--met-gold));
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -9px;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.7);
            border: 2px solid #010409;
        }

        /* --- MAP TOOLTIP --- */
        #map-tooltip {
            position: absolute;
            display: none;
            padding: 15px 25px;
            background: rgba(1, 4, 9, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid var(--met-gold);
            border-radius: 12px;
            color: #fff;
            pointer-events: none;
            z-index: 3000;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            font-size: 0.9rem;
            min-width: 160px;
        }

        #map-tooltip b { color: var(--met-gold); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        #map-tooltip span { color: var(--accent-forest); font-weight: 800; font-size: 1.1rem; }

        @media (max-width: 768px) {
            .landing-title-main { font-size: 2.2rem; }
            header { padding: 10px 15px; gap: 10px; overflow-x: auto; justify-content: flex-start; }
            .header-item { font-size: 0.7rem; padding: 8px 12px; }
            .chart-container { min-width: 100%; height: 350px; }
            #time-control-dock { width: 92%; }
        }
    </style>
</head>

<body>

    <div id="portal-flash"></div>
    <div id="map-tooltip"></div>

    <!-- 1. LANDING PAGE -->
    <section id="landing-page">
        <div id="hero-canvas-container"></div>
        
        <div class="hero-content">
            <h1 class="landing-title-main">
                Deep Learning Based Application for Classification of <span class="highlight">Deforestation</span>
            </h1>
            <div class="hero-btns">
                <button id="enter-app-btn" class="btn-main">
                    Explore Dashboard <i class="fas fa-bolt"></i>
                </button>
            </div>
        </div>
    </section>

    <!-- 2. DASHBOARD CONTAINER -->
    <div id="dashboard-container">
        <header>
            <div class="header-item" id="nav-state">STATE ANALYSIS</div>
            <div class="header-item" id="nav-district">DISTRICT ANALYSIS</div>
            <div class="header-item" id="nav-map">3D VISUALIZATION</div>
        </header>

        <main class="main-content">
            <!-- PAGE 1: STATE ANALYSIS -->
            <section id="state-analysis-page" class="page-section active">
                <div class="chart-container"><canvas id="forestChart"></canvas></div>
                <div class="chart-container"><canvas id="stateLineChart"></canvas></div>
            </section>

            <!-- PAGE 2: DISTRICT ANALYSIS -->
            <section id="district-analysis-page" class="page-section">
                <!-- Wrapper for Row stacking on mobile -->
                <div style="display: flex; width: 100%; gap: 30px; flex-wrap: wrap;">
                    <div class="chart-container" style="flex: 0 0 220px; min-width: 200px; height: 350px; padding: 25px 20px; align-self: flex-start;">
                        <label style="display:block; margin-bottom:12px; font-weight:700; color:var(--met-gold); text-transform:uppercase; letter-spacing:2px; font-size: 0.7rem;">Select District</label>
                        <select id="district-select" style="width:100%; padding:10px; background:rgba(15,23,42,0.8); color:#fff; border:2px solid var(--met-gold); border-radius:8px; font-family:inherit; cursor:pointer; font-size: 0.85rem;">
                            <option value="" disabled selected>-- Choose --</option>
                        </select>
                    </div>
                    <div class="chart-container" style="flex: 1; height: 350px;"><canvas id="districtForestChart"></canvas></div>
                </div>
                <div class="chart-container" style="flex: 1 1 100%; height: 480px;"><canvas id="districtLineChart"></canvas></div>
            </section>

            <!-- PAGE 3: 3D MAP -->
            <section id="map-3d-page" class="page-section" style="flex-direction:column; align-items:center;">
                <div id="canvas-container" style="width:100%; height:750px; border-radius:32px; overflow:hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.8); border: 4px solid var(--met-gold); position: relative;"></div>
            </section>
        </main>

        <!-- TIME CONTROL DOCK -->
        <div id="time-control-dock">
            <div class="slider-header">
                <span class="slider-label">TIME SCALE</span>
                <span id="year-display-large">2023</span>
            </div>
            <input type="range" id="global-time-slider" min="2015" max="2025" step="2" value="2023">
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="importmap">
        {
          "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
          }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        window.addEventListener("DOMContentLoaded", () => {

            // --- HERO SECTION INITIALIZATION ---
            let isTransitioning = false;
            let heroCamera, heroScene, heroRenderer, starField, heroTrees;

            const initHero = () => {
                const container = document.getElementById('hero-canvas-container');
                heroScene = new THREE.Scene();
                heroScene.fog = new THREE.FogExp2(0x020617, 0.035);
                heroCamera = new THREE.PerspectiveCamera(65, container.clientWidth / container.clientHeight, 0.1, 1500);
                heroRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                heroRenderer.setSize(container.clientWidth, container.clientHeight);
                heroRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                container.appendChild(heroRenderer.domElement);
                heroCamera.position.set(0, 8, 30);
                
                heroScene.add(new THREE.AmbientLight(0x404040, 1.2));
                const sun = new THREE.DirectionalLight(0x22C55E, 2);
                sun.position.set(10, 20, 10);
                heroScene.add(sun);

                // Stars
                const starGeo = new THREE.BufferGeometry();
                const starPos = new Float32Array(6000 * 3);
                for(let i=0; i<18000; i++) starPos[i] = (Math.random() - 0.5) * 1000;
                starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
                starField = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.8, transparent: true, opacity: 0.8 }));
                heroScene.add(starField);

                // Ground
                const gGeo = new THREE.PlaneGeometry(120, 120, 60, 60);
                gGeo.rotateX(-Math.PI / 2);
                const pos = gGeo.attributes.position;
                for (let i = 0; i < pos.count; i++) {
                    const x = pos.getX(i); const z = pos.getZ(i);
                    pos.setY(i, Math.sin(x * 0.2) * Math.cos(z * 0.2) * 2.8);
                }
                gGeo.computeVertexNormals();
                heroScene.add(new THREE.Mesh(gGeo, new THREE.MeshPhongMaterial({ color: 0x050a0f, flatShading: true })));

                // Trees
                heroTrees = new THREE.Group();
                const createTree = () => {
                    const g = new THREE.Group();
                    const t = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.2, 0.8, 6), new THREE.MeshPhongMaterial({ color: 0x1a0f0a }));
                    t.position.y = 0.4; g.add(t);
                    const leafMat = new THREE.MeshPhongMaterial({ color: 0x15803d, flatShading: true });
                    for(let i=0; i<3; i++) {
                        const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.8 - i*0.15, 1.5, 6), leafMat);
                        leaf.position.y = 1.3 + i*0.6; g.add(leaf);
                    }
                    g.userData.sway = Math.random() * Math.PI * 2;
                    return g;
                };
                for(let i=0; i<400; i++) {
                    const tr = createTree();
                    const x = (Math.random() - 0.5) * 130; const z = (Math.random() - 0.5) * 130;
                    if(Math.abs(x) < 5 && Math.abs(z) < 15) continue;
                    tr.position.set(x, Math.sin(x * 0.2) * Math.cos(z * 0.2) * 2.8, z);
                    tr.scale.setScalar(0.7 + Math.random() * 0.8);
                    heroTrees.add(tr);
                }
                heroScene.add(heroTrees);

                const animate = (t) => {
                    requestAnimationFrame(animate);
                    const time = t * 0.001;
                    if (!isTransitioning) {
                        heroCamera.position.x = Math.sin(time * 0.12) * 6;
                        heroCamera.position.z = 30 + Math.cos(time * 0.08) * 4;
                        heroCamera.lookAt(0, 4, -10);
                        starField.rotation.y = time * 0.01;
                    } else {
                        heroCamera.position.z -= 4.2; heroCamera.fov += 1.8; heroCamera.updateProjectionMatrix();
                        starField.position.z += 20;
                    }
                    heroTrees.children.forEach(tr => tr.rotation.z = Math.sin(time * 0.8 + tr.userData.sway) * 0.04);
                    heroRenderer.render(heroScene, heroCamera);
                };
                animate(0);
            };
            initHero();

            // --- UI HANDLERS ---
            const landing = document.getElementById('landing-page');
            const dashboard = document.getElementById('dashboard-container');
            const portal = document.getElementById('portal-flash');
            
            document.getElementById('enter-app-btn').addEventListener('click', () => {
                isTransitioning = true;
                landing.classList.add('transitioning');
                setTimeout(() => portal.style.opacity = '1', 400);
                setTimeout(() => {
                    landing.style.display = 'none';
                    dashboard.classList.add('visible');
                    portal.style.opacity = '0';
                    handleGlobalTimeUpdate("2023");
                    // Highlighting the State Analysis button by default
                    document.getElementById('nav-state').classList.add('active-nav');
                }, 1000);
            });

            // Navigation
            const navItems = document.querySelectorAll('.header-item');
            const pages = document.querySelectorAll('.page-section');
            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    const targetId = item.id === 'nav-state' ? 'state-analysis-page' : 
                                   item.id === 'nav-district' ? 'district-analysis-page' : 'map-3d-page';
                    pages.forEach(p => p.classList.remove('active'));
                    navItems.forEach(n => n.classList.remove('active-nav'));
                    document.getElementById(targetId).classList.add('active');
                    item.classList.add('active-nav');
                    if(targetId === 'map-3d-page' && !window.mapInit) { initMap(); window.mapInit = true; }
                });
            });

            // ==========================================
            //  CORE DATA PART (STRICTLY PRESERVED)
            // ==========================================
   
// Replace your old API_BASE with this:
const API_BASE = window.location.origin + "/api/analysis";
            const districts = [
    "Ariyalur", "Chengalpattu", "Chennai", "Coimbatore", "Cuddalore", 
    "Dharmapuri", "Dindigul", "Erode", "Kalakurichi", "Kancheepuram", 
    "Kanyakumari", "Karur", "Krishnagiri", "Madurai", "Mayiladudurai", 
    "Nagapattinam", "Namakkal", "Nilgris", "Perambalur", "Pudukkottai", 
    "Ramanathapuram", "Ranipet", "Salem", "Sivagangai", "Tenkasi", 
    "Thanjavur", "Theni", "Thoothukudi", "Tiruchirappalli", "Tirunelveli", 
    "Tirupattur", "Tiruppur", "Tiruvallur", "Tiruvanamalai", "Tiruvarur", 
    "Vellore", "viluppuram", "virudhunagar"
];
async function fetchDistrictData(district) {
    const res = await fetch(`${API_BASE}/district/${district}`);
    return await res.json();
}
            // Global State for Charts
            let charts = {};
            const timeSlider = document.getElementById('global-time-slider');
            const yearDisplay = document.getElementById('year-display-large');
            const districtSelect = document.getElementById('district-select');

            // --- CHART HELPERS ---
            function updateDoughnut(id, data) {
    const ctx = document.getElementById(id).getContext('2d');
    if (charts[id]) charts[id].destroy();
    charts[id] = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Forest', 'Land', 'Water'],
            datasets: [{ 
                data: data, 
                backgroundColor: ['#00D084', '#F72585', '#4361EE'], 
                borderWidth: 0,
                hoverBorderColor: '#ffffff',
hoverBorderWidth: 2,
                // --- ADD THESE TWO LINES ---
                hoverOffset: 30,      // This "pushes" the segment out by 30 pixels
                //spacing: 5            // Adds a small gap between segments for a modern look
            }]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            cutout: '75%',
            // Optional: Smooth out the animation
            animation: {
                animateRotate: true,
                animateScale: true
            },
            plugins: { 
                legend: { 
                    position: 'bottom', 
                    labels: { color: '#bdc3c7', font: { weight: '600' } } 
                } 
            }
        }
    });
}

         function updateTrend(id, labels, values) {
    const ctx = document.getElementById(id).getContext('2d');
    const gradient = ctx.createLinearGradient(0, 0, 0, 400);
    gradient.addColorStop(0, 'rgba(0, 208, 132, 0.2)');
    gradient.addColorStop(1, 'transparent');
    
    if (charts[id]) charts[id].destroy();
    
    charts[id] = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{ 
                data: values, 
                borderColor: '#00D084', 
                borderWidth: 4, 
                pointBackgroundColor: '#fff', 
                fill: true, 
                backgroundColor: gradient, 
                tension: 0.4 
            }]
        },
        options: {
            responsive: true, 
            maintainAspectRatio: false,
            scales: { 
                y: { 
                    grid: { color: 'rgba(255,255,255,0.05)' }, 
                    ticks: { color: '#94A3B8' },
                    // --- Y-AXIS LABEL ---
                    title: {
                        display: true,
                        text: 'Forest Coverage Percentage',
                        color: '#94A3B8',
                        font: { size: 12, weight: '600', family: 'Poppins' }
                    }
                },
                x: { 
                    grid: { display: false }, 
                    ticks: { color: '#94A3B8' },
                    // --- X-AXIS LABEL ---
                    title: {
                        display: true,

}
            // --- CENTRAL UPDATE LOGIC ---
async function handleGlobalTimeUpdate(year) {
    yearDisplay.innerText = year;
    timeSlider.value = year;

    // 1. STATE DATA (Tamil Nadu Overview)
 // 1. STATE DATA (Tamil Nadu Overview)
try {
    const stateRawData = await fetch(`${API_BASE}/all`).then(r => r.json());
    
    // Group all districts by year to get the State average
    const stateAverages = {};
    stateRawData.forEach(d => {
        const y = d.id.year;
        if (!stateAverages[y]) stateAverages[y] = { sum: 0, count: 0, land: 0, water: 0 };
        stateAverages[y].sum += d.forestPercentage;
        stateAverages[y].land += d.landPercentage;
        stateAverages[y].water += d.waterPercentage;
        stateAverages[y].count += 1;
    });

    // Extract the average for the CURRENT selected year (for the Pie Chart)
    const currentYearAvg = stateAverages[year];
    if (currentYearAvg) {
        const avgForest = currentYearAvg.sum / currentYearAvg.count;
        const avgLand = currentYearAvg.land / currentYearAvg.count;
        const avgWater = currentYearAvg.water / currentYearAvg.count;
        updateDoughnut('forestChart', [avgForest, avgLand, avgWater]);

        // Fix the "Hairball": Build a clean State trend line (One point per year)
        const sortedYears = Object.keys(stateAverages).sort((a, b) => a - b).filter(y => y <= year);
        const trendLabels = sortedYears;
        const trendValues = sortedYears.map(y => stateAverages[y].sum / stateAverages[y].count);
        
        updateTrend('stateLineChart', trendLabels, trendValues);
    }
} catch(e) { console.error("State error:", e); }

    // 2. DISTRICT DATA (The part that uses the new [Year, Value] format)
    const selected = districtSelect.value;
    if (selected) {
        try {
            const distData = await fetchDistrictData(selected);
            
            // Fix 1: Map the Trend Line using array indexes [0] and [1]
            const dLabels = distData.filter(row => row[0] <= year).map(row => row[0]);
            const dValues = distData.filter(row => row[0] <= year).map(row => row[1]);
            updateTrend('districtLineChart', dLabels, dValues);

            // Fix 2: Match the year for the Pie Chart using array index [0]
            const dy = distData.find(row => row[0] == year);
            if (dy) {
                // Since we only averaged Forest, we'll estimate Land/Water for the visual
                const forest = dy[1];
                updateDoughnut('districtForestChart', [forest, 100 - forest - 5, 5]);
            }
        } catch(e) { console.error("District error:", e); }
    }

    if (window.mapUpdate) window.mapUpdate(year);
}
            // Event Listeners
            timeSlider.addEventListener('input', (e) => handleGlobalTimeUpdate(e.target.value));
            districtSelect.addEventListener('change', () => handleGlobalTimeUpdate(timeSlider.value));

            // Populate Select
            districts.forEach(d => {
                const o = document.createElement('option'); o.value = d; o.innerText = d;
                districtSelect.appendChild(o);
            });

            // --- 3D MAP VISUALS (TAMIL NADU EXTRUSION) ---
            function initMap() {
                const cont = document.getElementById('canvas-container');
                const mScene = new THREE.Scene();
                const mCam = new THREE.PerspectiveCamera(45, cont.clientWidth / cont.clientHeight, 0.1, 1000);
                const mRen = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                mRen.setSize(cont.clientWidth, cont.clientHeight);
                cont.appendChild(mRen.domElement);
                mCam.position.set(0, 18, 22);
                const ctrl = new OrbitControls(mCam, mRen.domElement);
                mScene.add(new THREE.AmbientLight(0xffffff, 0.8));
                const sun = new THREE.DirectionalLight(0xffffff, 0.5);
                sun.position.set(10, 20, 10); mScene.add(sun);

                const tnShape = new THREE.Shape();
                tnShape.moveTo(9.5, -8); tnShape.lineTo(8.5, -8.8); tnShape.lineTo(2, -7.5); tnShape.lineTo(-3.5, -4.5);
                tnShape.lineTo(-3, -2); tnShape.lineTo(-1.5, 1.5); tnShape.lineTo(-1, 6.5); tnShape.lineTo(0.5, 10);
                tnShape.lineTo(4, 7); tnShape.lineTo(6.5, 5); tnShape.lineTo(6, 0.5); tnShape.lineTo(8.5, -1.2);
                tnShape.lineTo(9.5, -2.2); tnShape.lineTo(9.5, -8);

                const mapGeo = new THREE.ExtrudeGeometry(tnShape, { depth: 0.5, bevelEnabled: true, bevelThickness: 0.2, bevelSize: 0.2 });
                mapGeo.rotateX(Math.PI / 2);
                const mapMesh = new THREE.Mesh(mapGeo, new THREE.MeshPhongMaterial({ color: 0x1e293b, shininess: 80, specular: 0xffffff }));
                mapMesh.position.y = -0.5; mScene.add(mapMesh);

                const meshes = [];
                const dGeo = new THREE.CylinderGeometry(0.3, 0.3, 1, 6);
                
                const coords = {
                    "Chennai": { x: 9.5, z: -8 }, "Tiruvallur": { x: 8.5, z: -8.8 }, "Kancheepuram": { x: 8, z: -7 }, "Chengalpattu": { x: 8.8, z: -6.5 },
                    "Vellore": { x: 5, z: -7.5 }, "Ranipet": { x: 6.5, z: -7.5 }, "Tirupattur": { x: 4, z: -6.5 }, "Tiruvanamalai": { x: 5.5, z: -5.5 },
                    "Krishnagiri": { x: 2, z: -7.5 }, "Dharmapuri": { x: 2.5, z: -6.2 }, "Viluppuram": { x: 7, z: -5 }, "Kalakurichi": { x: 5, z: -4.5 },
                    "Cuddalore": { x: 8.5, z: -4.2 }, "Salem": { x: 3, z: -4.5 }, "Erode": { x: 0.5, z: -4.2 }, "Namakkal": { x: 2.8, z: -3 },
                    "Nilgris": { x: -3.5, z: -4.5 }, "Coimbatore": { x: -3, z: -2 }, "Tiruppur": { x: -1, z: -2.5 }, "Karur": { x: 1.5, z: -2.2 },
                    "Tiruchirappalli": { x: 4, z: -2.5 }, "Perambalur": { x: 5.5, z: -3.2 }, "Ariyalur": { x: 6.8, z: -3.2 }, "Thanjavur": { x: 7, z: -1.5 },
                    "Tiruvarur": { x: 8.5, z: -1.2 }, "Nagapattinam": { x: 9.5, z: -2.2 }, "Mayiladudurai": { x: 9.2, z: -3 }, "Pudukkottai": { x: 6, z: 0.5 },
                    "Dindigul": { x: 0.5, z: -0.5 }, "Theni": { x: -1.5, z: 1.5 }, "Madurai": { x: 2, z: 1.5 }, "Sivagangai": { x: 5.5, z: 1.8 },
                    "Virudhunagar": { x: 1.5, z: 4 }, "Ramanathapuram": { x: 6.5, z: 5 }, "Tenkasi": { x: -1, z: 6.5 }, "Tirunelveli": { x: 1.5, z: 7.5 },
                    "Thoothukudi": { x: 4, z: 7 }, "Kanyakumari": { x: 0.5, z: 10 }
                };

                districts.forEach(d => {
                    const material = new THREE.MeshPhongMaterial({ color: 0x00D084, shininess: 50, emissive: 0x000000 });
                    const m = new THREE.Mesh(dGeo, material);
                    const pos = coords[d] || { x: (Math.random()-0.5)*5, z: (Math.random()-0.5)*5 };
                    m.position.set(pos.x, 0, pos.z);
                    m.userData = { name: d, percent: 0 };
                    mScene.add(m); meshes.push(m);
                });

               window.mapUpdate = async (year) => {
    for(let m of meshes) {
        try {
            const data = await fetchDistrictData(m.userData.name);
            // Fix: Changed 'it.id.year' to 'it.year'
            const y = data.find(it => it.id.year == year);
            if(y) {
                                const forestVal = y.forestPercentage;
                                const h = 0.5 + (forestVal / 12);
                                m.scale.y = h; 
                                m.position.y = h/2;
                                m.userData.percent = forestVal.toFixed(2);
                                
                                if(forestVal < 15) m.material.color.setHex(0xf39c12);
                                else if(forestVal < 30) m.material.color.setHex(0xbadc58);
                                else m.material.color.setHex(0x00D084);
                            }
                        } catch(e) {
                            const h = 1.5 + Math.random() * 2;
                            m.scale.y = h; m.position.y = h/2;
                            m.userData.percent = (h * 8).toFixed(1);
                        }
                    }
                };
                
                const ray = new THREE.Raycaster();
                const mouse = new THREE.Vector2();
                const tip = document.getElementById('map-tooltip');

                cont.addEventListener('mousemove', (e) => {
                    const r = cont.getBoundingClientRect();
                    mouse.x = ((e.clientX - r.left) / cont.clientWidth) * 2 - 1;
                    mouse.y = -((e.clientY - r.top) / cont.clientHeight) * 2 + 1;
                    tip.style.left = (e.clientX + 20) + 'px';
                    tip.style.top = (e.clientY + 20) + 'px';
                });

                const loop = () => {
                    requestAnimationFrame(loop);
                    ray.setFromCamera(mouse, mCam);
                    const hits = ray.intersectObjects(meshes);
                    
                    if(hits.length > 0) {
                        const target = hits[0].object;
                        tip.style.display = 'block';
                        tip.innerHTML = `<b>${target.userData.name}</b>Forest Cover: <span>${target.userData.percent}%</span>`;
                        target.material.emissive.setHex(0x113311);
                        meshes.forEach(m => { if(m !== target) m.material.emissive.setHex(0x000000); });
                    } else {
                        tip.style.display = 'none';
                        meshes.forEach(m => m.material.emissive.setHex(0x000000));
                    }
                    mRen.render(mScene, mCam);
                    ctrl.update();
                };
                loop();
                
                window.addEventListener('resize', () => {
                    mCam.aspect = cont.clientWidth / cont.clientHeight;
                    mCam.updateProjectionMatrix();
                    mRen.setSize(cont.clientWidth, cont.clientHeight);
                });
                
                window.mapUpdate(timeSlider.value);
            }
        });
    </script>
